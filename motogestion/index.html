<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0284c7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MotoGestión" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <!-- App info -->
    <meta name="description" content="Gestión integral de flota — GPS Satelital Cartagena" />
    <!-- Tipografía profesional: Inter (estándar de SaaS). Los documentos impresos siguen en Arial. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>MotoGestión</title>
    <!-- Tema día/noche: se aplica ANTES de cargar React para que no parpadee.
         La elección vive en Configuración → Apariencia (localStorage mg_theme). -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem("mg_theme");
          var t = (v === "light" || v === "dark")
            ? v
            : (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Puente con la app local de HID DigitalPersona (lector de huellas) — debe cargarse como script global, no como módulo -->
    <script src="/websdk/websdk.client.ui.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
